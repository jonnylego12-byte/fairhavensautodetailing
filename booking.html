<!DOCTYPE html>
<html>
<head>
    <title>Book Appointment</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Book Your Appointment</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="services.html">Services</a>
        <a href="booking.html">Booking</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<div class="section">
    <h2>Booking Request</h2>
    <p>This is a request — not confirmed until we contact you.</p>

<form action="https://formsubmit.co/jonnylego12@gmail.com" method="POST">

    <input type="hidden" name="_captcha" value="false">
    <input type="hidden" name="_subject" value="New Booking Request - Jonny & Hudson">

    <input type="text" name="name" placeholder="Full Name" required>
    <input type="email" name="email" placeholder="Email" required>
    <input type="tel" name="phone" placeholder="Phone Number" required>

    <select name="service" required>
        <option value="">Select Service</option>
        <option>Interior Detail - $100</option>
        <option>Exterior Detail - $50</option>
        <option>Full Detail - $125</option>
    </select>

    <h3>Add-Ons</h3>
    <input type="checkbox" name="addon" value="Engine Bay Cleaning $20"> Engine Bay Cleaning $20<br>
    <input type="checkbox" name="addon" value="Leather Conditioning $30"> Leather Conditioning $30<br>
    <input type="checkbox" name="addon" value="Pet Hair Removal $20"> Pet Hair Removal $20<br>
    <input type="checkbox" name="addon" value="Body Fluid Cleanup $30"> Body Fluid Cleanup $30<br>

    <input type="date" name="date" required>

    <textarea name="message" placeholder="Extra details about vehicle"></textarea>

    <br><br>
    <button type="submit">Send Booking Request</button>

</form>

</div>

</body>
</html>
